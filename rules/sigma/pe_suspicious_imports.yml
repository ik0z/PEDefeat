title: Suspicious PE Import Combination - Injection
id: pd-sigma-001
status: stable
level: critical
description: Detects PE files importing classic process injection API combinations
author: Khaled M. Alshammri | @ik0z
date: 2026/03/17
tags:
  - attack.defense_evasion
  - attack.t1055
detection:
  selection_injection:
    - VirtualAllocEx
    - WriteProcessMemory
    - CreateRemoteThread
    - NtCreateThreadEx
    - QueueUserAPC
  condition: selection_injection
falsepositives:
  - Legitimate debuggers
  - Security tools
