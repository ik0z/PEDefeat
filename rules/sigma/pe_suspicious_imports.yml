title: Suspicious PE Strings - Ransomware Indicators
id: pd-sigma-005
status: stable
level: critical
description: Detects PE files containing ransomware-related strings
author: Khaled M. Alshammri | @ik0z
date: 2026/03/17
tags:
  - attack.impact
  - attack.t1486
detection:
  selection_ransom:
    - vssadmin delete shadows
    - wmic shadowcopy delete
    - bcdedit /set
    - YOUR FILES HAVE BEEN ENCRYPTED
    - bitcoin
    - monero
    - wbadmin delete catalog
  condition: selection_ransom
falsepositives:
  - Backup management scripts
